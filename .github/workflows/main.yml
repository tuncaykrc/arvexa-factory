name: ARVEXA_Diagnostic
on: [push]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sistem Teşhisi
        run: |
          echo "--- 1. Yazılım Sürümleri ---"
          java -version
          python3 --version
          
          echo "--- 2. Android SDK Durumu ---"
          # SDK Manager nerede ve hangi sürüm?
          sdkmanager --version
          
          echo "--- 3. Kurulu Paketler ---"
          # Sistem şu an hangi build-tools'u görüyor?
          sdkmanager --list_installed
