name: ARVEXA_Factory
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          # 1. Gerekli araçları kur
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev libtinfo6
          
          # 2. Lisansları kabul etmek için klasörü oluştur
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 3. Buildozer kur ve APK üret
          pip install --upgrade buildozer
          buildozer android debug
